<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="2" y="2" width="508" height="508" rx="107" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

  <!-- Grid lines -->
  <line x1="72" y1="160" x2="440" y2="160" stroke="rgba(148,163,184,0.07)" stroke-width="1.5"/>
  <line x1="72" y1="230" x2="440" y2="230" stroke="rgba(148,163,184,0.07)" stroke-width="1.5"/>
  <line x1="72" y1="300" x2="440" y2="300" stroke="rgba(148,163,184,0.07)" stroke-width="1.5"/>
  <line x1="72" y1="370" x2="440" y2="370" stroke="rgba(148,163,184,0.07)" stroke-width="1.5"/>

  <!-- Candlestick 1 — small bullish -->
  <!-- wick top -->
  <line x1="142" y1="318" x2="142" y2="338" stroke="#4ade80" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- body -->
  <rect x="118" y="338" width="48" height="56" rx="8" fill="url(#g1)" filter="url(#glow)"/>
  <!-- wick bottom -->
  <line x1="142" y1="394" x2="142" y2="408" stroke="#4ade80" stroke-width="5" stroke-linecap="round" opacity="0.8"/>

  <!-- Candlestick 2 — medium bullish -->
  <!-- wick top -->
  <line x1="256" y1="248" x2="256" y2="272" stroke="#34d399" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- body -->
  <rect x="232" y="272" width="48" height="80" rx="8" fill="url(#g2)" filter="url(#glow)"/>
  <!-- wick bottom -->
  <line x1="256" y1="352" x2="256" y2="372" stroke="#34d399" stroke-width="5" stroke-linecap="round" opacity="0.8"/>

  <!-- Candlestick 3 — tall bullish -->
  <!-- wick top -->
  <line x1="370" y1="148" x2="370" y2="175" stroke="#22c55e" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- body -->
  <rect x="346" y="175" width="48" height="120" rx="8" fill="url(#g3)" filter="url(#glow)"/>
  <!-- wick bottom -->
  <line x1="370" y1="295" x2="370" y2="315" stroke="#22c55e" stroke-width="5" stroke-linecap="round" opacity="0.8"/>

  <!-- Trend line -->
  <polyline
    points="100,395 142,360 256,285 370,190 430,155"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softglow)"
    opacity="0.95"
  />

  <!-- Arrow head -->
  <polygon points="430,155 406,148 412,174" fill="#818cf8" filter="url(#glow)"/>

  <!-- Dollar sign -->
  <text
    x="430"
    y="430"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="58"
    font-weight="800"
    fill="#38bdf8"
    opacity="0.55"
    text-anchor="middle"
  >$</text>
</svg>
