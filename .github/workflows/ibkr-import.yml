name: IBKR Trade Import

on:
  schedule:
    # 05:00 UTC = 08:00 Israel time (day after US market close)
    # Runs Tuesday–Saturday to capture previous weekday's trades
    - cron: '0 5 * * 2-6'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  import-trades:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Import IBKR trades into journal
        env:
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/ibkr-import.mjs
