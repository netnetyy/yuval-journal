name: IBKR Manual XML Import

on:
  workflow_dispatch:
    inputs:
      xml_filename:
        description: 'Path to XML file in repo (default: data/ibkr-report.xml)'
        required: false
        default: 'data/ibkr-report.xml'
      dry_run:
        description: 'Dry run only (no save to Supabase)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  import-trades:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Import IBKR XML into journal
        env:
          LOCAL_XML_FILE: ${{ github.event.inputs.xml_filename }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/ibkr-import.mjs
